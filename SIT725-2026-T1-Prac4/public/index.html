<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>SIT725 Prac 4 – Databases</title>
  <meta name="description" content="SIT725 Week 4 – Node.js + Express + MongoDB">
  <meta name="author" content="220086695">
  <!-- Materialize CSS -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/materialize/1.0.0/css/materialize.min.css">
  <!-- Material Icons -->
  <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons">
  <!-- Custom styles -->
  <link rel="stylesheet" href="css/styles.css">
</head>

<body>
  <nav>
    <div class="nav-wrapper navbar-size">
      <a href="#" class="brand-logo"><span class="white-text brand-title">Locate a Socket</span></a>
      <ul id="nav-mobile" class="right hide-on-med-and-down">
        <li><a href="#">Week 4</a></li>
      </ul>
    </div>
  </nav>

  <main class="main-body">
    <div class="container">
      <div class="row">
        <div class="col s12 center-align">
          <h4 id="heading">SIT725 – Week 4 Databases</h4>
          <p class="flow-text">Books served dynamically from MongoDB via REST API</p>
        </div>
        <div class="col s12 center-align">
          <a class="waves-effect waves-light btn click-me-button modal-trigger"
             id="clickMeButton" data-target="modal1">
            <i class="material-icons left">add</i>Add Book
          </a>
        </div>
      </div>

      <!-- Book cards injected here -->
      <div class="row" id="book-section"></div>
    </div>

    <!-- Add Book Modal -->
    <div id="modal1" class="modal modal-fixed-footer">
      <div class="modal-content">
        <h5>Add a New Book</h5>
        <div class="row">
          <div class="input-field col s12">
            <input id="book-title" type="text" class="validate">
            <label for="book-title">Title</label>
          </div>
          <div class="input-field col s12">
            <input id="book-image" type="text" class="validate" value="images/book.png">
            <label for="book-image" class="active">Image path</label>
          </div>
          <div class="input-field col s12">
            <input id="book-link" type="text" class="validate">
            <label for="book-link">Link text</label>
          </div>
          <div class="input-field col s12">
            <input id="book-description" type="text" class="validate">
            <label for="book-description">Description</label>
          </div>
        </div>
      </div>
      <div class="modal-footer">
        <a href="#!" id="formSubmit" class="modal-close waves-effect waves-green btn">Save</a>
        <a href="#!" class="modal-close waves-effect waves-red btn-flat">Cancel</a>
      </div>
    </div>
  </main>

  <!-- Materialize JS -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/materialize/1.0.0/js/materialize.min.js"></script>
  <script src="js/scripts.js"></script>
</body>

</html>
